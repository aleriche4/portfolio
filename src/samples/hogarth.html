<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Alain Leriche - Hogarth - Levis #501</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <section class="txt">
        <h1>Banners</h1>
        <div class="bg"></div>
        <div class="overlayContainer">
            <!-- <div class="clickZone"></div> -->
            <div class="centerPosition">
                <div class="titleSamples">
                    <img class="logo" src="images/thumbs/hogarth.png" alt="Hogarth" />
                    <span class="title2">
                        Hogarth
                    </span>
                </div>
                <div class="whiteBox">
                    <!-- <div id="preload"></div> -->
                    <div class="sizeup">
                        Levis #501<sup>®</sup> campaign 2013
                    </div>
                    <div class="txtSample">
                        Flash banners in 6 languages: <span style="white-space: nowrap;">Chinese, English,</span> French, German, Japanese and Spanish (160x600, 300x250, 300x600 and 728x90)
                    </div>
                    <div class="imageWrapper">
                        <img class="width224 lazyload" data-src="images/samples/hogarth/Levis_frame1.jpg" alt="Levis #501 Frame 1"/>
                        <img class="width224 lazyload" data-src="images/samples/hogarth/Levis_frame2.jpg" alt="Levis #501 Frame 2"/>
                        <img class="width224 lazyload" data-src="images/samples/hogarth/Levis_frame3.jpg" alt="Levis #501 Frame 3"/>
                        <img class="width224 lazyload" data-src="images/samples/hogarth/Levis_frame4.jpg" alt="Levis #501 Frame 4"/>
                    </div>
                    <div class="txtSample">
                        Expendable rich media Flash banners (160x600, 300x250, 300x600 and 728x90)
                    </div>
                    <div class="imageWrapper2">
                        <img class="width254 lazyload" data-src="images/samples/hogarth/Levis_rm_300x600.jpg" alt="Levis #501"/>  
                        <img class="width423 lazyload" data-src="images/samples/hogarth/Levis_rm_300x600-2.jpg" alt="Levis #501"/>
                    </div>
                    <div class="imageWrapper3">
                        <img class="width690 lazyload" data-src="images/samples/hogarth/Levis_rm_728x90.jpg" alt="Levis #501"/>  
                        <img class="width690 lazyload" data-src="images/samples/hogarth/Levis_rm_728x90-2.jpg" alt="Levis #501"/>
                    </div>
                </div>
                <div class="closeBtn"></div>
            </div>
        </div>
    </section>
</body>
</html>
